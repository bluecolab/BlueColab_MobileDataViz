name: Frontend Build Check
run-name: Build Check

permissions:
    contents: read

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    pr-branch-check:
        runs-on: ubuntu-latest
        steps:
            - name: Fail if PR is from app-build-branch
              run: |
                  echo "PR is from branch ${{ github.head_ref }} to ${{ github.base_ref }}"
                  if [ "${{ github.head_ref }}" = "app-build-branch" ]; then
                    echo "PRs from app-build-branch are not allowed."
                    exit 1
                  fi

    setup:
        runs-on: ubuntu-latest
        needs: pr-branch-check
        outputs:
            cache-hit: ${{ steps.cache.outputs.cache-hit }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
              with:
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
              with:
                  node-version: 24.x

            - name: Check Node.js and npm version
              run: |
                  node --version
                  npm --version

            - name: Validate package-lock.json
              if: ${{ !contains(join(github.event.pull_request.labels.*.name, ','), 'skip-check') }}
              run: node scripts/check-package-lock.js

            - name: Cache node_modules
              id: cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              run: npm ci

    lint:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
              with:
                  node-version: 24.x

            - name: Restore node_modules from cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Lint Check
              run: npm run lint

    audit:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
              with:
                  node-version: 24.x

            - name: Restore node_modules from cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: npm Audit
              run: npm audit --audit-level=critical

    spellcheck:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
              with:
                  node-version: 24.x

            - name: Restore node_modules from cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Spell check
              run: npx cspell .

    expo-doctor:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
            - name: Setup Node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # 6.3.0
              with:
                  node-version: 24.x
            - name: Restore node_modules from cache
              uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # 5.0.4
              with:
                  path: ./node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Expo Doctor Check
              run: npx expo-doctor
              continue-on-error: true
